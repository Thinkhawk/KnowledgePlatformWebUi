<div class="kp-card mx-auto" style="max-width:420px; margin-top:48px;">
  <div class="kp-header">
    <h2 class="mb-2">Login</h2>
    <p class="text-muted small">Sign in to access the Knowledge Platform</p>
  </div>

  <form [formGroup]="form" (ngSubmit)="submit()">
    <div class="mb-3">
      <label for="username" class="form-label">Username</label>
      <input id="username" formControlName="username" type="text" class="form-control" [class.is-invalid]="form.get('username')?.touched && form.get('username')?.invalid" />
      <div *ngIf="form.get('username')?.touched && form.get('username')?.invalid" class="invalid-feedback d-block">
        <div *ngIf="form.get('username')?.errors?.['required']">Username is required</div>
      </div>
    </div>

    <div class="mb-3">
      <label for="password" class="form-label">Password</label>
      <input id="password" formControlName="password" type="password" class="form-control" [class.is-invalid]="form.get('password')?.touched && form.get('password')?.invalid" />
      <div *ngIf="form.get('password')?.touched && form.get('password')?.invalid" class="invalid-feedback d-block">
        <div *ngIf="form.get('password')?.errors?.['required']">Password is required</div>
      </div>
    </div>

    <div class="d-flex justify-content-end">
      <button type="submit" class="btn btn-primary kp-btn" [disabled]="loading">{{ loading ? 'Logging in...' : 'Login' }}</button>
    </div>

    <div *ngIf="error" class="text-danger mt-3">{{ error }}</div>
  </form>

  <div class="kp-footer mt-3">
    <small>Don't have an account? Contact your administrator to create one.</small>
  </div>
</div>
