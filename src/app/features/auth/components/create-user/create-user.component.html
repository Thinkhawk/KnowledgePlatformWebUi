<div class="kp-card mx-auto" style="max-width:640px; margin-top:32px;">
  <div class="kp-header">
    <h2 class="mb-2">Create User</h2>
    <p class="text-muted small">Add a new user to the platform</p>
  </div>

  <form [formGroup]="form" (ngSubmit)="submit()">
    <div class="row g-3">
      <div class="col-md-6">
        <label for="username" class="form-label">Username</label>
        <input id="username" class="form-control" formControlName="username" />
      </div>

      <div class="col-md-6">
        <label for="email" class="form-label">Email</label>
        <input id="email" class="form-control" formControlName="email" />
      </div>

      <div class="col-md-6">
        <label for="password" class="form-label">Password</label>
        <input id="password" type="password" class="form-control" formControlName="password" />
      </div>

      <div class="col-md-6">
        <label for="role" class="form-label">Role</label>
        <select id="role" class="form-select" formControlName="role" [class.is-invalid]="form.get('role')?.touched && form.get('role')?.invalid">
          <option value="" disabled selected>Select a role</option>
          <option *ngFor="let r of roles" [value]="r">{{ r }}</option>
        </select>
        <div *ngIf="form.get('role')?.touched && form.get('role')?.invalid" class="invalid-feedback d-block">
          <div *ngIf="form.get('role')?.errors?.['required']">Role is required</div>
        </div>
      </div>
    </div>

    <div class="d-flex justify-content-end mt-3">
      <button type="submit" class="btn btn-primary kp-btn" [disabled]="loading">{{ loading ? 'Creating...' : 'Create User' }}</button>
    </div>

    <div *ngIf="message" class="text-success mt-3">{{ message }}</div>
    <div *ngIf="error" class="text-danger mt-3">{{ error }}</div>
  </form>
</div>
