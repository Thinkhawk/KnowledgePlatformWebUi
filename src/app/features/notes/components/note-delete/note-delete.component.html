<div class="delete-overlay d-flex flex-column align-items-center justify-content-center text-center p-3">

    @if (apiError() || concurrencyError()) {
    <div class="alert alert-danger p-2 small w-100">
        {{ apiError() || concurrencyError() }}
        @if (concurrencyError()) {
        <button class="btn btn-xs btn-link" (click)="loadNotes()">Reload</button>
        }
    </div>
    }

    <div class="bg-white p-3 rounded shadow-sm border border-danger w-100">
        <h6 class="text-danger fw-bold mb-2">Confirm Delete?</h6>
        <p class="small text-muted mb-3">This action is permanent.</p>

        <div class="d-grid gap-2">
            <button class="btn btn-sm btn-danger" (click)="confirmDelete()" [disabled]="concurrencyError() !== null">
                Yes, Delete
            </button>
            <a [routerLink]="['/', noteReadModel()?.teamId]" class="btn btn-sm btn-light border">
                Cancel
            </a>
        </div>
    </div>
</div>
