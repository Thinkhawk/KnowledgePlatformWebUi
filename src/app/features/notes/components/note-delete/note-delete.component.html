<div class="container py-4" style="max-width: 500px;">

    @if (apiError() || concurrencyError()) {
    <div class="alert alert-danger shadow-sm">
        <p class="mb-2">{{ apiError() || concurrencyError() }}</p>
        @if (concurrencyError()) {
        <button class="btn btn-sm btn-outline-danger" (click)="loadNotes()">Reload</button>
        }
    </div>
    }

    @if(noteReadModel(); as note){
    <div class="card shadow-sm border-0">
        <div class="card-body text-center">
            <h4 class="card-title text-danger mb-3">Delete Note?</h4>

            <p class="text-muted">
                You are about to delete: <br>
                <strong>{{ note.title }}</strong>
            </p>

            <div class="d-grid gap-2 d-md-flex justify-content-md-center mt-4">
                <a [routerLink]="['/', note.teamId]" class="btn btn-light px-4">
                    Cancel
                </a>

                <button (click)="confirmDelete()"
                        [disabled]="concurrencyError() !== null"
                        class="btn btn-danger px-4">
                    Confirm Delete
                </button>
            </div>
        </div>
    </div>
    }

</div>
