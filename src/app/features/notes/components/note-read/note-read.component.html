<div class="container mt-1">
    <div *ngIf="apiError()" class="alert alert-danger">
        {{ apiError() }}
    </div>
        <div class="d-flex justify-content-end mb-3">
            <a class="btn btn-warning "
               [routerLink]="['createNote']">
                Create Note
            </a>
        </div>
        <note-filter [teamId]="teamId()" [noteReadModels]="noteReadModels()" (filterEvent)="handleFilterEvent($event)"></note-filter>
        <div class="mt-5">
        <div class="row">
            <div class="col-md-4 col-sm-6 mb-4" *ngFor="let note of noteReadModels()">
                <div class="card h-100 shadow-sm position-relative">
                    <div class="card-header">
                        <h5 class="card-title">{{ note.title }}</h5>
                        <small class="text-muted">User: {{ note.userId }}</small><br />
                        <small class="text-muted">Created on: {{ note.createdAtUtc | date:'short' }}</small>
                    </div>
                    <div class="card-body">
                        <p class="card-text">{{ note.content }}</p>
                        <div class="mt-2">
                            <span class="badge bg-light text-dark me-1" *ngFor="let tag of note.tags">#{{ tag }}</span>
                        </div>
                    </div>
                    <div class="card-footer">
                        <div class="btn-group w-100">
                            <a class="btn btn-sm btn-outline-primary" [routerLink]="['edit/', note.noteId]">Edit</a>
                            <a class="btn btn-sm btn-outline-danger" [routerLink]="['delete/', note.noteId]">Delete</a>
                        </div>
                    </div>

                    <router-outlet></router-outlet>
                </div>
            </div>
        </div>
    </div> 
</div>
